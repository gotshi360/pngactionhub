<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Clapperboard body -->
  <rect x="2" y="6" width="20" height="15" rx="2"/>
  <!-- Top stripe divider (production clapperboard) -->
  <line x1="2" y1="10.5" x2="22" y2="10.5"/>
  <!-- Diagonal clapperboard stripes -->
  <line x1="6"  y1="6" x2="4"  y2="10.5"/>
  <line x1="11" y1="6" x2="9"  y2="10.5"/>
  <line x1="16" y1="6" x2="14" y2="10.5"/>
  <line x1="21" y1="6" x2="19" y2="10.5"/>
  <!-- Chain link in body (left half: curves left) -->
  <path d="M12 15.5 L8.5 15.5 A2 2 0 0 0 8.5 12.5 L12 12.5"/>
  <!-- Chain link in body (right half: curves right) -->
  <path d="M12 15.5 L15.5 15.5 A2 2 0 0 1 15.5 12.5 L12 12.5"/>
</svg>
